name: Build, Test & Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Lint and type-check
        run: |
          npm ci
          npm run check
          npm run lint

      - name: Checkout obsidian-docker
        uses: actions/checkout@v4
        with:
          repository: cpoepke/obsidian-docker
          path: obsidian-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Obsidian image
        uses: docker/build-push-action@v6
        with:
          context: obsidian-docker
          load: true
          tags: ghcr.io/cpoepke/obsidian-docker:latest
          cache-from: type=gha,scope=obsidian
          cache-to: type=gha,mode=max,scope=obsidian

      - name: Build MCP server image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: obsidian-mcp:test
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

      - name: Generate test API keys
        id: keys
        run: |
          OBS_KEY=$(openssl rand -hex 32)
          MCP_KEY=$(openssl rand -hex 32)
          echo "::add-mask::${OBS_KEY}"
          echo "::add-mask::${MCP_KEY}"
          echo "obs_key=${OBS_KEY}" >> "$GITHUB_OUTPUT"
          echo "mcp_key=${MCP_KEY}" >> "$GITHUB_OUTPUT"

      - name: Start containers
        run: |
          LOCAL_REST_API_KEY=${{ steps.keys.outputs.obs_key }} \
          OBSIDIAN_API_KEY=${{ steps.keys.outputs.obs_key }} \
          MCP_API_KEY=${{ steps.keys.outputs.mcp_key }} \
          docker compose up -d

      - name: Wait for Obsidian REST API
        run: |
          echo "Waiting for REST API (up to 180s)..."
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:27123/ >/dev/null 2>&1; then
              echo "REST API ready after $((i*2))s"
              break
            fi
            sleep 2
          done

      - name: Seed test vault
        run: |
          chmod +x tests/seed-vault.sh
          ./tests/seed-vault.sh

      - name: Run MCP server integration tests
        continue-on-error: true
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh http://127.0.0.1:3001 ${{ steps.keys.outputs.mcp_key }}

      - name: Capture logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v

  push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=pr

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp
          platforms: linux/amd64
