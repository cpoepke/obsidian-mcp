name: Build, Test & Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout obsidian-docker
        uses: actions/checkout@v4
        with:
          repository: cpoepke/obsidian-docker
          path: obsidian-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Obsidian image
        uses: docker/build-push-action@v6
        with:
          context: obsidian-docker
          load: true
          tags: ghcr.io/cpoepke/obsidian-docker:latest
          cache-from: type=gha,scope=obsidian
          cache-to: type=gha,mode=max,scope=obsidian

      - name: Build MCP server image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: obsidian-mcp:test
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

      - name: Start containers
        run: MCP_API_KEY=test-api-key docker compose up -d

      - name: Seed test vault and extract API key
        run: |
          chmod +x tests/seed-vault.sh
          sleep 10
          ./tests/seed-vault.sh
          # Extract the auto-generated Obsidian REST API key
          OBS_KEY=$(docker exec obsidian cat /vaults/default/.obsidian/plugins/obsidian-local-rest-api/data.json 2>/dev/null | jq -r '.apiKey // empty' || true)
          if [ -n "$OBS_KEY" ]; then
            echo "OBSIDIAN_API_KEY=${OBS_KEY}" >> "$GITHUB_ENV"
            echo "Extracted Obsidian API key: ${OBS_KEY:0:16}..."
          else
            echo "WARNING: No Obsidian API key found"
          fi

      - name: Restart MCP server with Obsidian API key
        run: |
          OBSIDIAN_API_KEY="${OBSIDIAN_API_KEY}" MCP_API_KEY=test-api-key docker compose up -d mcp-server
          sleep 5

      - name: Run MCP server integration tests
        continue-on-error: true
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh http://127.0.0.1:3001 test-api-key

      - name: Capture logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v

  push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=pr

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp
          platforms: linux/amd64
