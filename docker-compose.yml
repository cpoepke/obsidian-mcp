services:
  obsidian:
    image: ghcr.io/cpoepke/obsidian-docker:latest
    container_name: obsidian
    shm_size: "256m"
    ports:
      - "27123:27123"
      - "27124:27124"
    volumes:
      - vault-data:/vaults/default
      - obsidian-config:/config/obsidian
    environment:
      - OBSIDIAN_VAULT_PATH=/vaults/default
      - LOCAL_REST_API_PORT=27124
      - DISPLAY=:99
      - ELECTRON_DISABLE_GPU=1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:27123/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - mcp-net

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obsidian-mcp
    ports:
      - "3001:3001"
    environment:
      - OBSIDIAN_API_URL=http://obsidian:27123
      - OBSIDIAN_API_KEY=${OBSIDIAN_API_KEY:-}
      - MCP_API_KEY=${MCP_API_KEY:-test-api-key}
      - MCP_TRANSPORT=http
      - MCP_PORT=3001
    depends_on:
      obsidian:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - mcp-net

networks:
  mcp-net:
    driver: bridge

volumes:
  vault-data:
  obsidian-config:
